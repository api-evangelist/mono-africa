description: >-
  FinOps view of Mono spend. Mono is a usage-priced open banking platform:
  Financial Data cost is driven by the number of linked accounts and/or
  successful data calls (transactions, identity, income, balance, statements),
  DirectPay cost is a fee per successful bank collection, and Lookup cost is a
  fee per identity/account verification. Development against the sandbox with
  test keys is free; charges begin on live keys after business onboarding.
  Because several data reads depend on upstream institutions, cost can correlate
  with retry/real-time behavior as well as raw call volume.
notes: >-
  Per-unit rates are not reconciled here - Mono quotes pricing per product and
  often per contract. Verify current rates with Mono during reconciliation.
  Mono was acquired by Flutterwave (Jan 2026), which may change billing entities
  and terms.
