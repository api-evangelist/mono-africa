meters:
- name: linked_accounts
  description: Number of customer bank accounts linked and maintained via Connect.
  unit: accounts
  aggregation: sum
  dimensions:
  - application
  - institution
- name: financial_data_calls
  description: Successful Financial Data reads (transactions, identity, income, balance, statements, assets).
  unit: calls
  aggregation: sum
  dimensions:
  - application
  - product
- name: directpay_collections
  description: Successful DirectPay bank collections.
  unit: transactions
  aggregation: sum
  dimensions:
  - application
- name: lookup_verifications
  description: Identity/account verifications via the Lookup services (BVN, NIN, CAC, account-number, Mashup).
  unit: verifications
  aggregation: sum
  dimensions:
  - application
  - lookup_type
principles:
- name: Visibility
  description: Track linked-account count, data-call volume by product, DirectPay collections, and Lookup verifications per application.
- name: Allocation
  description: Use per-application keys and the meta field on linked accounts/payments to map spend to internal products or customer segments.
- name: Optimization
  description: Cache non-real-time data instead of re-reading it; reserve the x-real-time header for when freshness is required; unlink accounts you no longer need; check data_status before calling to avoid wasted retries.
- name: Accountability
  description: Assign owners per application/product; review monthly linked-account and verification volume against budget.
